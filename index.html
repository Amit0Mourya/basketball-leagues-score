<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Basketball Live Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --surface: #0e1420; --surface2: #141c28; --border: #1e2a3a;
    --accent: #f5a623; --accent2: #00e5a0; --live: #22c55e; --upcoming: #3b82f6;
    --finished: #6b7280; --text: #e8edf3; --text-muted: #5a6a7e; --text-dim: #8a9ab0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%); width:800px; height:400px; background:radial-gradient(ellipse,rgba(245,166,35,0.06) 0%,transparent 70%); pointer-events:none; z-index:0; }

  header { position:relative; z-index:1; padding:22px 28px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--accent); display:flex; align-items:center; gap:8px; }
  .logo span { color:var(--text); }
  .meta { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); text-align:right; line-height:1.7; }
  .meta strong { color:var(--accent2); }
  .refresh-btn { font-family:'DM Mono',monospace; font-size:11px; background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  .refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* FILTERS */
  .filters-bar { position:relative; z-index:1; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .filter-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
  .filter-group { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .filter-chip { font-family:'DM Mono',monospace; font-size:10px; padding:4px 12px; border-radius:20px; border:1px solid var(--border); color:var(--text-muted); background:transparent; cursor:pointer; transition:all 0.18s; white-space:nowrap; }
  .filter-chip:hover { border-color:var(--accent); color:var(--text); }
  .filter-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(245,166,35,0.08); }
  .filter-divider { width:1px; height:20px; background:var(--border); margin:0 4px; }
  .date-input { font-family:'DM Mono',monospace; font-size:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 10px; border-radius:6px; cursor:pointer; transition:border-color 0.18s; outline:none; }
  .date-input:focus, .date-input:hover { border-color:var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter:invert(0.5); cursor:pointer; }
  .clear-btn { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); background:transparent; border:none; cursor:pointer; padding:4px 8px; border-radius:4px; transition:color 0.15s; }
  .clear-btn:hover { color:var(--accent); }
  .results-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); margin-left:auto; white-space:nowrap; }
  .results-count strong { color:var(--text-dim); }

  .tabs { display:flex; padding:16px 28px 0; border-bottom:1px solid var(--border); position:relative; z-index:1; }
  .tab { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; letter-spacing:1px; text-transform:uppercase; padding:9px 18px; cursor:pointer; border:1px solid transparent; border-bottom:none; border-radius:6px 6px 0 0; color:var(--text-muted); background:transparent; transition:all 0.2s; position:relative; bottom:-1px; display:flex; align-items:center; gap:7px; }
  .tab:hover { color:var(--text); background:var(--surface); }
  .tab.active { color:var(--text); background:var(--surface); border-color:var(--border); border-bottom-color:var(--surface); }
  .badge { background:var(--border); color:var(--text-dim); border-radius:10px; padding:1px 7px; font-size:10px; min-width:20px; text-align:center; transition:all 0.2s; }
  .tab.active.live-tab .badge { background:var(--live); color:#000; }
  .tab.active.upcoming-tab .badge { background:var(--upcoming); color:#fff; }

  .content { position:relative; z-index:1; padding:20px 28px; max-width:1100px; }
  .section { display:none; }
  .section.active { display:block; }
  .game-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:12px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; transition:border-color 0.2s,transform 0.15s; position:relative; overflow:hidden; }
  .card:hover { border-color:rgba(245,166,35,0.3); transform:translateY(-1px); }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:12px 12px 0 0; }
  .card.live::before { background:linear-gradient(90deg,var(--live),rgba(34,197,94,0.2)); }
  .card.upcoming::before { background:linear-gradient(90deg,var(--upcoming),rgba(59,130,246,0.2)); }
  .card.finished::before { background:linear-gradient(90deg,var(--border),transparent); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:8px; }
  .league { font-size:10px; font-family:'DM Mono',monospace; color:var(--text-muted); letter-spacing:0.5px; line-height:1.6; flex:1; }
  .league strong { color:var(--accent); display:block; font-size:11px; }
  .status-pill { font-size:10px; font-family:'DM Mono',monospace; padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .status-pill.live { background:rgba(34,197,94,0.15); color:var(--live); border:1px solid rgba(34,197,94,0.3); }
  .status-pill.upcoming { background:rgba(59,130,246,0.12); color:var(--upcoming); border:1px solid rgba(59,130,246,0.25); }
  .status-pill.finished { background:rgba(107,114,128,0.12); color:var(--finished); border:1px solid rgba(107,114,128,0.2); }

  .scoreboard { display:flex; align-items:center; justify-content:space-between; margin:8px 0; gap:8px; }
  .team-block { flex:1; text-align:center; }
  .team-name { font-size:12px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:4px; }
  .team-score { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; color:var(--text); letter-spacing:1px; }
  .card.live .team-score { color:var(--accent); }
  .card.finished .team-score { color:var(--text-dim); }
  .vs-block { text-align:center; flex-shrink:0; width:36px; }
  .vs-text { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); }

  .card-footer { margin-top:10px; padding-top:9px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
  .quarters { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); }
  .quarters strong { color:var(--text-dim); }
  .clock-badge { font-family:'DM Mono',monospace; font-size:10px; color:var(--live); background:rgba(34,197,94,0.08); padding:2px 8px; border-radius:4px; }
  .pdf-link { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent2); text-decoration:none; border:1px solid rgba(0,229,160,0.2); padding:2px 8px; border-radius:4px; transition:background 0.15s; }
  .pdf-link:hover { background:rgba(0,229,160,0.1); }

  .live-dot { width:7px; height:7px; background:var(--live); border-radius:50%; display:inline-block; animation:pulse 1.5s ease-in-out infinite; margin-right:3px; vertical-align:middle; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; color:var(--text-muted); font-family:'DM Mono',monospace; font-size:12px; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:10px; padding:16px 20px; margin:16px 0; font-family:'DM Mono',monospace; font-size:11px; color:#f87171; line-height:1.6; }
  .empty-state { text-align:center; padding:50px 20px; color:var(--text-muted); font-family:'DM Mono',monospace; font-size:12px; }
  .empty-state div { font-size:28px; margin-bottom:10px; }

  @media(max-width:600px) {
    header,.filters-bar,.tabs,.content { padding-left:14px; padding-right:14px; }
    .game-grid { grid-template-columns:1fr; }
    .tab { padding:7px 10px; font-size:10px; }
    .filters-bar { gap:8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏀 <span>Basketball Live</span></div>
  <div class="meta" id="meta">—</div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
</header>

<div class="filters-bar">
  <span class="filter-label">League</span>
  <div class="filter-group" id="leagueChips">
    <span class="filter-chip active" data-league="all" onclick="toggleLeague(this)">All</span>
  </div>
  <div class="filter-divider"></div>
  <span class="filter-label">Date</span>
  <input type="date" class="date-input" id="dateFilter" onchange="applyFilters()">
  <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
  <div class="results-count" id="resultsCount"></div>
</div>

<div class="tabs">
  <button class="tab live-tab active" onclick="switchTab('live',this)"><span class="live-dot"></span>Live <span class="badge" id="badge-live">—</span></button>
  <button class="tab upcoming-tab" onclick="switchTab('upcoming',this)">Upcoming <span class="badge" id="badge-upcoming">—</span></button>
  <button class="tab finished-tab" onclick="switchTab('finished',this)">Finished <span class="badge" id="badge-finished">—</span></button>
</div>

<div class="content">
  <div id="loading" class="loading"><div class="spinner"></div><div>Fetching scores…</div></div>
  <div id="error" class="error-box" style="display:none"></div>
  <div id="section-live" class="section active"></div>
  <div id="section-upcoming" class="section"></div>
  <div id="section-finished" class="section"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBKSb82emMAMroneJYozR9pV04p0EQg1jB1gbM2kAqm8jTYJkChbZdrAioH_BI-5L10CKrBE-G4Vfp/pub?gid=766531449&single=true&output=csv';
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

let allData = { live: [], upcoming: [], finished: [] };
let activeLeague = 'all';
let activeDate   = '';

async function fetchCSV() {
  let lastErr = '';
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(CSV_URL), { signal: AbortSignal.timeout(9000) });
      if (!r.ok) { lastErr = 'HTTP ' + r.status; continue; }
      const text = await r.text();
      if (text && text.length > 100) return text;
      lastErr = 'Empty response';
    } catch(e) { lastErr = e.message; }
  }
  throw new Error(lastErr || 'All proxies failed');
}

function parseCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c==='"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c===',' && !inQ) { res.push(cur.trim()); cur=''; }
    else cur += c;
  }
  res.push(cur.trim());
  return res;
}

function parseSectioned(text) {
  const lines = text.split('\n');
  const out = { live:[], upcoming:[], finished:[] };
  let sec = null;
  const isHeader = s => /date.*time|tournament|home.?team/i.test(s);

  for (const line of lines) {
    const cols = parseCSVLine(line);
    const f = (cols[0]||'').trim();
    if (!f) continue;
    if (/LIVE|🟢/.test(f))     { sec='live';     continue; }
    if (/UPCOMING|📅/.test(f)) { sec='upcoming'; continue; }
    if (/FINISHED|✅/.test(f)) { sec='finished'; continue; }
    if (isHeader(f) || !cols[2]||!cols[2].trim()) continue;
    if (sec) out[sec].push(cols);
  }
  return out;
}

// Extract date string from time column like "30 May 2026, 13:00 IST"
function extractDate(timeStr) {
  if (!timeStr) return '';
  // Try to parse "30 May 2026, 13:00 IST" → "2026-05-30"
  const m = timeStr.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);
  if (!m) return '';
  const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const mo = months[m[2].substring(0,3)];
  if (!mo) return '';
  return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`;
}

function buildLeagueChips(data) {
  const leagues = new Set();
  [...data.live, ...data.upcoming, ...data.finished].forEach(row => {
    const l = (row[1]||'').trim();
    if (l) leagues.add(l);
  });
  const container = document.getElementById('leagueChips');
  container.innerHTML = `<span class="filter-chip ${activeLeague==='all'?'active':''}" data-league="all" onclick="toggleLeague(this)">All</span>`;
  [...leagues].sort().forEach(l => {
    const short = l.replace('NBL1 ','').replace(' Men','M').replace(' Women','W');
    const chip = document.createElement('span');
    chip.className = 'filter-chip' + (activeLeague===l?' active':'');
    chip.dataset.league = l;
    chip.textContent = short;
    chip.onclick = function(){ toggleLeague(this); };
    container.appendChild(chip);
  });
}

function toggleLeague(el) {
  activeLeague = el.dataset.league;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function clearFilters() {
  activeLeague = 'all';
  activeDate   = '';
  document.getElementById('dateFilter').value = '';
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-league="all"]').classList.add('active');
  applyFilters();
}

function applyFilters() {
  activeDate = document.getElementById('dateFilter').value; // "YYYY-MM-DD"

  const filter = rows => rows.filter(row => {
    const league = (row[1]||'').trim();
    const date   = extractDate(row[0]||'');
    if (activeLeague !== 'all' && league !== activeLeague) return false;
    if (activeDate && date && date !== activeDate) return false;
    return true;
  });

  const fLive     = filter(allData.live);
  const fUpcoming = filter(allData.upcoming);
  const fFinished = filter(allData.finished);

  renderSection('live',     fLive,     'live');
  renderSection('upcoming', fUpcoming, 'upcoming');
  renderSection('finished', fFinished, 'finished');

  const total = fLive.length + fUpcoming.length + fFinished.length;
  const hasFilter = activeLeague !== 'all' || activeDate;
  document.getElementById('resultsCount').innerHTML = hasFilter
    ? `<strong>${total}</strong> result${total!==1?'s':''}` : '';
}

function scoreDisplay(score) {
  if (!score || score==='vs') return {home:'—',away:'—'};
  const p = score.split('-');
  return {home:p[0]||'—', away:p[1]||'—'};
}
function extractClock(s) { const m=(s||'').match(/[Qq]\d\s+\d{1,2}:\d{2}/); return m?m[0]:null; }
function extractMins(s)  { const m=(s||'').match(/~(\d+)\s*min/); return m?'~'+m[1]+' min left':null; }

function renderCard(row, type) {
  const [time, tournament, home, score, away, status, quarters,,pdf] = row;
  const sd    = scoreDisplay(score);
  const q     = (quarters||'').trim();
  const clock = extractClock(status||'');
  const mins  = extractMins(status||'');
  const dateStr = extractDate(time||'');

  let pill = '';
  if (type==='live')     pill=`<span class="status-pill live"><span class="live-dot"></span>${clock||'LIVE'}</span>`;
  else if(type==='upcoming') pill=`<span class="status-pill upcoming">Upcoming</span>`;
  else                   pill=`<span class="status-pill finished">Final</span>`;

  const pdfHtml   = (pdf||'').startsWith('http') ? `<a href="${pdf}" target="_blank" class="pdf-link">📄 Report</a>` : '';
  const minsBadge = mins ? `<span class="clock-badge">⏱ ${mins}</span>` : '';

  return `<div class="card ${type}">
    <div class="card-header">
      <div class="league"><strong>${tournament||'Basketball'}</strong>${time||''}</div>
      ${pill}
    </div>
    <div class="scoreboard">
      <div class="team-block"><div class="team-name">${home||'—'}</div><div class="team-score">${sd.home}</div></div>
      <div class="vs-block"><div class="vs-text">${type==='upcoming'?'vs':''}</div></div>
      <div class="team-block"><div class="team-name">${away||'—'}</div><div class="team-score">${sd.away}</div></div>
    </div>
    <div class="card-footer">
      <div class="quarters">${q?q.replace(/\|/g,' <strong>·</strong> '):''}</div>
      <div style="display:flex;gap:6px;align-items:center">${minsBadge}${pdfHtml}</div>
    </div>
  </div>`;
}

function renderSection(id, rows, type) {
  const el = document.getElementById('section-'+id);
  const icons = {live:'😴',upcoming:'📅',finished:'🏁'};
  el.innerHTML = rows.length
    ? `<div class="game-grid">${rows.map(r=>renderCard(r,type)).join('')}</div>`
    : `<div class="empty-state"><div>${icons[id]}</div>No ${id} games${activeLeague!=='all'||activeDate?' for this filter':' right now'}.</div>`;
  document.getElementById('badge-'+id).textContent = rows.length;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-'+name).classList.add('active');
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';

  try {
    const text = await fetchCSV();
    allData = parseSectioned(text);
    buildLeagueChips(allData);
    applyFilters();
    const total = allData.live.length + allData.upcoming.length + allData.finished.length;
    const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('meta').innerHTML = `<strong>${total}</strong> games &nbsp;·&nbsp; Updated <strong>${now}</strong>`;
  } catch(e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `⚠ Could not load data: ${e.message}<br><small>Make sure your Google Sheet is published as CSV.</small>`;
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
