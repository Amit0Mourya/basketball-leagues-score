<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Basketball Live Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1016; --surface: #131b26; --surface2: #1b2636; --border: #28374d;
    --accent: #f5a623; --accent-hover: #ffb845; --accent2: #00e5a0; 
    --live: #22c55e; --upcoming: #3b82f6; --finished: #6b7280; 
    --text: #f0f4f8; --text-muted: #8498af; --text-dim: #a1b4cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 900px; height: 500px; background: radial-gradient(ellipse, rgba(245,166,35,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }

  /* Header */
  header { position: relative; z-index: 1; padding: 24px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; background: rgba(11, 16, 22, 0.8); backdrop-filter: blur(8px); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--accent); display: flex; align-items: center; gap: 10px; text-shadow: 0 2px 10px rgba(245,166,35,0.2); }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.8; }
  .meta strong { color: var(--accent2); }
  .refresh-btn { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(245,166,35,0.05); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Filters Bar */
  .filters-bar { position: relative; z-index: 1; padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 12px; }
  .filter-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  
  /* Form Inputs (Select & Date) */
  .styled-input { appearance: none; -webkit-appearance: none; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
  .styled-input:focus, .styled-input:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,166,35,0.1); }
  
  /* Custom Dropdown Arrow */
  .select-wrapper { position: relative; display: flex; align-items: center; }
  .select-wrapper::after { content: '▼'; font-size: 9px; color: var(--text-muted); position: absolute; right: 14px; pointer-events: none; }
  .styled-select { padding-right: 32px; min-width: 160px; }
  .styled-select option { background: var(--bg); color: var(--text); }
  
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7) sepia(1) hue-rotate(180deg); cursor: pointer; }
  .filter-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .clear-btn { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); background: transparent; border: none; cursor: pointer; padding: 8px 12px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
  .clear-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
  .results-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-left: auto; background: var(--surface2); padding: 6px 12px; border-radius: 20px; }
  .results-count strong { color: var(--text); }

  /* Modern Segmented Tabs */
  .tabs-container { padding: 24px 32px 0; position: relative; z-index: 1; display: flex; justify-content: center; }
  .tabs { display: inline-flex; background: var(--surface); padding: 6px; border-radius: 12px; border: 1px solid var(--border); gap: 4px; }
  .tab { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; padding: 10px 24px; cursor: pointer; border: none; border-radius: 8px; color: var(--text-muted); background: transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--surface2); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .badge { background: var(--border); color: var(--text-dim); border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 600; min-width: 24px; text-align: center; transition: all 0.2s; }
  .tab.active.live-tab .badge { background: rgba(34,197,94,0.2); color: var(--live); }
  .tab.active.upcoming-tab .badge { background: rgba(59,130,246,0.2); color: var(--upcoming); }

  /* Content & Grid */
  .content { position: relative; z-index: 1; padding: 24px 32px 40px; max-width: 1300px; margin: 0 auto; }
  .section { display: none; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all 0.2s ease; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .card:hover { border-color: rgba(245,166,35,0.4); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
  .card.live::before { background: linear-gradient(90deg, var(--live), rgba(34,197,94,0.1)); }
  .card.upcoming::before { background: linear-gradient(90deg, var(--upcoming), rgba(59,130,246,0.1)); }
  .card.finished::before { background: linear-gradient(90deg, var(--border), transparent); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; }
  .league { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); letter-spacing: 0.5px; line-height: 1.6; flex: 1; min-width: 0; }
  .league strong { color: var(--accent); display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  
  .status-pill { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.5px; }
  .status-pill.live { background: rgba(34,197,94,0.1); color: var(--live); border: 1px solid rgba(34,197,94,0.2); }
  .status-pill.upcoming { background: rgba(59,130,246,0.1); color: var(--upcoming); border: 1px solid rgba(59,130,246,0.2); }
  .status-pill.finished { background: rgba(107,114,128,0.1); color: var(--finished); border: 1px solid rgba(107,114,128,0.2); }

  .scoreboard { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding: 12px 0; background: rgba(0,0,0,0.15); border-radius: 10px; }
  .team-block { flex: 1; text-align: center; padding: 0 8px; }
  .team-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
  .team-score { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: var(--text); letter-spacing: 1.5px; }
  .card.live .team-score { color: var(--accent); text-shadow: 0 0 15px rgba(245,166,35,0.2); }
  .card.finished .team-score { color: var(--text-dim); }
  
  .vs-divider { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; width: 40px; }
  .vs-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .vs-dash { width: 1px; height: 20px; background: var(--border); }

  .card-footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .quarters { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); line-height: 1.8; flex: 1; }
  .quarters .q-item { margin-right: 12px; white-space: nowrap; display: inline-block; }
  .quarters .q-label { color: var(--text-dim); font-weight: 500; }
  .card-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .clock-badge { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--live); background: rgba(34,197,94,0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(34,197,94,0.2); }
  .pdf-link { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--accent2); text-decoration: none; border: 1px solid rgba(0,229,160,0.3); padding: 4px 10px; border-radius: 6px; transition: all 0.2s; background: rgba(0,229,160,0.05); }
  .pdf-link:hover { background: rgba(0,229,160,0.15); box-shadow: 0 0 10px rgba(0,229,160,0.1); }

  .live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; display: inline-block; animation: pulse 1.5s ease-in-out infinite; margin-right: 6px; vertical-align: baseline; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

  /* States */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 20px; gap: 20px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 13px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 20px; margin: 16px 0; font-family: 'DM Mono', monospace; font-size: 12px; color: #f87171; line-height: 1.8; }
  .error-box a { color: var(--accent); text-decoration: underline; cursor: pointer; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 13px; background: var(--surface); border: 1px dashed var(--border); border-radius: 16px; }
  .empty-state .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.8; }

  @media(max-width: 768px) {
    header, .filters-bar, .tabs-container, .content { padding-left: 20px; padding-right: 20px; }
    .tabs-container { padding-top: 20px; }
    .game-grid { grid-template-columns: 1fr; }
    .logo { font-size: 26px; }
    .header-right { width: 100%; justify-content: space-between; }
    .filters-bar { flex-direction: column; align-items: stretch; gap: 12px; }
    .filter-group { flex-direction: column; align-items: stretch; gap: 8px; }
    .filter-divider { display: none; }
    .results-count { margin-left: 0; text-align: center; }
    .tabs { width: 100%; display: flex; }
    .tab { flex: 1; justify-content: center; padding: 10px 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏀 <span>Basketball Live</span></div>
  <div class="header-right">
    <div class="meta" id="meta">—</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">League</span>
    <div class="select-wrapper">
      <select id="leagueSelect" class="styled-input styled-select" onchange="toggleLeague(this.value)">
        <option value="all">All Leagues</option>
      </select>
    </div>
  </div>
  
  <div class="filter-divider"></div>
  
  <div class="filter-group">
    <span class="filter-label">Date</span>
    <input type="date" class="styled-input date-input" id="dateFilter" onchange="applyFilters()">
  </div>

  <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
  <div class="results-count" id="resultsCount"></div>
</div>

<div class="tabs-container">
  <div class="tabs">
    <button class="tab live-tab active" onclick="switchTab('live',this)">
      <span class="live-dot"></span>Live <span class="badge" id="badge-live">—</span>
    </button>
    <button class="tab upcoming-tab" onclick="switchTab('upcoming',this)">
      Upcoming <span class="badge" id="badge-upcoming">—</span>
    </button>
    <button class="tab finished-tab" onclick="switchTab('finished',this)">
      Finished <span class="badge" id="badge-finished">—</span>
    </button>
  </div>
</div>

<div class="content">
  <div id="loading" class="loading"><div class="spinner"></div><div>Fetching latest scores…</div></div>
  <div id="error" class="error-box" style="display:none"></div>
  <div id="section-live"     class="section active"></div>
  <div id="section-upcoming" class="section"></div>
  <div id="section-finished" class="section"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBKSb82emMAMroneJYozR9pV04p0EQg1jB1gbM2kAqm8jTYJkChbZdrAioH_BI-5L10CKrBE-G4Vfp/pub?gid=766531449&single=true&output=csv';

const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

let allData = { live:[], upcoming:[], finished:[] };
let activeLeague = 'all';
let activeDate   = '';

/* ── FETCH ── */
async function fetchCSV() {
  let lastErr = '';
  for (const proxy of PROXIES) {
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), 9000);
      const r    = await fetch(proxy(CSV_URL), { signal: ctrl.signal });
      clearTimeout(tid);
      if (!r.ok) { lastErr = 'HTTP ' + r.status; continue; }
      const text = await r.text();
      if (text && text.length > 100) return text;
      lastErr = 'Empty response';
    } catch(e) { lastErr = e.message || String(e); }
  }
  throw new Error(lastErr || 'All proxies failed');
}

/* ── CSV PARSE ── */
function parseCSVLine(line) {
  const res=[]; let cur='', inQ=false;
  for (let i=0; i<line.length; i++) {
    const c = line[i];
    if (c==='"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c===',' && !inQ) { res.push(cur.trim()); cur=''; }
    else cur += c;
  }
  res.push(cur.trim());
  return res;
}

function parseDateTime(timeStr) {
  if (!timeStr) return new Date(0);
  const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m = timeStr.match(/(\d{1,2})\s+(\w{3})\w*\s+(\d{4}),?\s*(\d{1,2}):(\d{2})/);
  if (!m) return new Date(0);
  const mo = MONTHS[m[2]];
  if (mo === undefined) return new Date(0);
  return new Date(Date.UTC(+m[3], mo, +m[1], +m[4], +m[5]));
}

function extractDate(timeStr) {
  if (!timeStr) return '';
  const MONTHS = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m = timeStr.match(/(\d{1,2})\s+(\w{3})\w*\s+(\d{4})/);
  if (!m) return '';
  const mo = MONTHS[m[2]];
  return mo ? `${m[3]}-${mo}-${m[1].padStart(2,'0')}` : '';
}

function parseSectioned(text) {
  const lines = text.split('\n');
  const out   = { live:[], upcoming:[], finished:[] };
  let sec = null;
  const isColHeader = s => /date.*time|tournament|home.?team/i.test(s);

  for (const line of lines) {
    const cols = parseCSVLine(line);
    const f    = (cols[0]||'').trim();
    if (!f) continue;
    if (/LIVE|🟢/.test(f))     { sec='live';     continue; }
    if (/UPCOMING|📅/.test(f)) { sec='upcoming'; continue; }
    if (/FINISHED|✅/.test(f)) { sec='finished'; continue; }
    if (isColHeader(f) || !cols[2] || !cols[2].trim()) continue;
    if (sec) out[sec].push(cols);
  }

  out.finished.sort((a,b) => parseDateTime(b[0]) - parseDateTime(a[0]));
  return out;
}

/* ── LEAGUE DROPDOWN ── */
function buildLeagueDropdown(data) {
  const leagues = new Set();
  [...data.live,...data.upcoming,...data.finished].forEach(row => {
    const l = (row[1]||'').trim();
    if (l) leagues.add(l);
  });

  const select = document.getElementById('leagueSelect');
  select.innerHTML = `<option value="all">All Leagues</option>`;

  [...leagues].sort().forEach(l => {
    const short = l.replace('NBL1 ','').replace(' Men',' M').replace(' Women',' W').trim() || l;
    const opt = document.createElement('option');
    opt.value = l;
    opt.textContent = short;
    if (activeLeague === l) opt.selected = true;
    select.appendChild(opt);
  });
}

function toggleLeague(val) {
  activeLeague = val;
  applyFilters();
}

function clearFilters() {
  activeLeague = 'all';
  activeDate   = '';
  document.getElementById('dateFilter').value = '';
  document.getElementById('leagueSelect').value = 'all';
  applyFilters();
}

/* ── FILTERS ── */
function applyFilters() {
  activeDate = document.getElementById('dateFilter').value;

  const filter = rows => rows.filter(row => {
    const league = (row[1]||'').trim();
    const date   = extractDate(row[0]||'');
    if (activeLeague !== 'all' && league !== activeLeague) return false;
    if (activeDate && date && date !== activeDate) return false;
    return true;
  });

  const fL = filter(allData.live);
  const fU = filter(allData.upcoming);
  const fF = filter(allData.finished);

  renderSection('live',     fL, 'live');
  renderSection('upcoming', fU, 'upcoming');
  renderSection('finished', fF, 'finished');

  const total = fL.length + fU.length + fF.length;
  const hasFilter = activeLeague !== 'all' || activeDate;
  document.getElementById('resultsCount').innerHTML = hasFilter
    ? `<strong>${total}</strong> result${total!==1?'s':''}` : '';
}

/* ── CARD RENDER ── */
function sd(score) {
  if (!score || score==='vs') return {h:'—',a:'—'};
  const p = score.split('-');
  return {h: p[0]||'—', a: p[1]||'—'};
}
function extractClock(s) { const m=(s||'').match(/[Qq]\d[\s:]+\d{1,2}:\d{2}/); return m?m[0].trim():null; }
function extractMins(s)  { const m=(s||'').match(/~(\d+)\s*min/); return m?'~'+m[1]+' min left':null; }
function cleanLabel(s)   { return (s||'').replace(/^[🟢📅✅]\s*/,'').replace(/·?\s*~\d+\s*min\s*left/,'').trim(); }

function renderCard(row, type) {
  const [time, tournament, home, score, away, status, quarters,,pdf] = row;
  const scores = sd(score);
  const q      = (quarters||'').trim();
  const clock  = extractClock(status||'');
  const mins   = extractMins(status||'');
  const label  = cleanLabel(status||'');

  let pill;
  if (type==='live')
    pill = `<span class="status-pill live"><span class="live-dot"></span>${clock||label||'LIVE'}</span>`;
  else if (type==='upcoming')
    pill = `<span class="status-pill upcoming">${label||'Upcoming'}</span>`;
  else
    pill = `<span class="status-pill finished">Final</span>`;

  let qHtml = '';
  if (q) {
    qHtml = q.split('|').map(p => {
      p = p.trim();
      const colon = p.indexOf(':');
      if (colon < 0) return `<span class="q-item">${p}</span>`;
      const lbl = p.substring(0, colon).trim();
      const val = p.substring(colon+1).trim();
      return `<span class="q-item"><span class="q-label">${lbl}:</span> ${val}</span>`;
    }).join('');
  }

  const pdfHtml   = (pdf||'').startsWith('http') ? `<a href="${pdf}" target="_blank" class="pdf-link">📄 Report</a>` : '';
  const minsBadge = mins ? `<span class="clock-badge">⏱ ${mins}</span>` : '';

  return `<div class="card ${type}">
    <div class="card-header">
      <div class="league"><strong>${tournament||'Basketball'}</strong>${time||''}</div>
      ${pill}
    </div>
    <div class="scoreboard">
      <div class="team-block">
        <div class="team-name">${home||'—'}</div>
        <div class="team-score">${scores.h}</div>
      </div>
      <div class="vs-divider">
        <div class="vs-dash"></div>
        <div class="vs-text">${type==='upcoming'?'vs':''}</div>
        <div class="vs-dash"></div>
      </div>
      <div class="team-block">
        <div class="team-name">${away||'—'}</div>
        <div class="team-score">${scores.a}</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="quarters">${qHtml}</div>
      <div class="card-actions">${minsBadge}${pdfHtml}</div>
    </div>
  </div>`;
}

function renderSection(id, rows, type) {
  const el    = document.getElementById('section-'+id);
  const icons = {live:'⚡',upcoming:'📅',finished:'🏁'};
  const msg   = activeLeague!=='all'||activeDate ? ' for your selected filters' : ' right now';
  el.innerHTML = rows.length
    ? `<div class="game-grid">${rows.map(r=>renderCard(r,type)).join('')}</div>`
    : `<div class="empty-state"><div class="icon">${icons[id]}</div>No ${id} games${msg}.</div>`;
  document.getElementById('badge-'+id).textContent = rows.length;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-'+name).classList.add('active');
}

/* ── MAIN LOAD ── */
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="live-dot" style="animation:none"></span> Loading…';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display   = 'none';

  try {
    const text = await fetchCSV();
    allData = parseSectioned(text);
    buildLeagueDropdown(allData);
    applyFilters();

    const total = allData.live.length + allData.upcoming.length + allData.finished.length;
    const now   = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('meta').innerHTML =
      `Source: Live Sync &nbsp;·&nbsp; <strong>${total}</strong> games &nbsp;·&nbsp; Updated <strong>${now}</strong>`;
  } catch(e) {
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerHTML = `⚠ Could not load data: <strong>${e.message}</strong><br><br>
      <small>Ensure the proxy is active or check the network tab.
      <br><br><a href="${CSV_URL}" target="_blank">Open Raw Data directly</a></small>`;
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled    = false;
  btn.textContent = '↻ Refresh';
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
